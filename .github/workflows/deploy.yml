# VALORHIVE Production Deployment Workflow
# Deploys to AWS ECS Fargate after CI passes on main branch
#
# This workflow:
# - Builds and pushes Docker image to AWS ECR
# - Deploys to AWS ECS Fargate
# - Runs Prisma migrations
# - Invalidates CloudFront cache
# - Supports staging and production environments

name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_migration:
        description: 'Skip database migrations'
        required: false
        default: false
        type: boolean

# Only one deployment per environment at a time
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  CONTAINER_NAME: valorhive
  NODE_VERSION: '20'

jobs:
  # ===========================================
  # Check CI Status
  # ===========================================
  check-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Check CI workflow status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: context.ref.replace('refs/heads/', ''),
              status: 'completed',
              per_page: 1
            });
            
            if (runs.workflow_runs.length === 0) {
              core.setFailed('No successful CI runs found for this branch');
              return;
            }
            
            const latestRun = runs.workflow_runs[0];
            if (latestRun.conclusion !== 'success') {
              core.setFailed(`Latest CI run was not successful: ${latestRun.conclusion}`);
            }
            
            console.log(`Latest CI run: ${latestRun.id} - ${latestRun.conclusion}`);

  # ===========================================
  # Production Approval Gate
  # ===========================================
  approval:
    name: Production Approval
    runs-on: ubuntu-latest
    needs: check-ci
    if: |
      always() && 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') ||
      (github.event_name == 'push')

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://valorhive.in

    steps:
      - name: Approval confirmation
        run: |
          echo "Deploying to ${{ github.event.inputs.environment || 'production' }} environment"
          echo "Triggered by: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

  # ===========================================
  # Build and Push Docker Image
  # ===========================================
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: approval
    timeout-minutes: 30

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'production' }}"
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPOSITORY="${{ env.ECR_REPOSITORY }}"
          SHORT_SHA="${{ github.sha }}"
          
          # Create tags
          TAGS="${REGISTRY}/${REPOSITORY}:${ENVIRONMENT}"
          TAGS="${TAGS},${REGISTRY}/${REPOSITORY}:${ENVIRONMENT}-${SHORT_SHA:0:7}"
          TAGS="${TAGS},${REGISTRY}/${REPOSITORY}:${ENVIRONMENT}-${{ github.run_number }}"
          
          if [ "$ENVIRONMENT" = "production" ]; then
            TAGS="${TAGS},${REGISTRY}/${REPOSITORY}:latest"
          fi
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.environment }}-${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '0'  # Warn only, don't fail deployment

  # ===========================================
  # Run Database Migrations
  # ===========================================
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event.inputs.skip_migration != 'true'
    timeout-minutes: 15

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}-migrations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Check migration status
        run: npx prisma migrate status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify migrations
        run: npx prisma migrate status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ===========================================
  # Deploy to ECS
  # ===========================================
  deploy-ecs:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: [build-push, migrate]
    if: always() && needs.build-push.result == 'success'
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get current ECS task definition
        id: current-task
        run: |
          aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' \
            --output text > current_task_def.txt
          echo "task_def=$(cat current_task_def.txt)" >> $GITHUB_OUTPUT

      - name: Update task definition with new image
        id: update-task
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'production' }}"
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${ENVIRONMENT}-${{ github.sha }}"
          
          # Get current task definition
          aws ecs describe-task-definition \
            --task-definition ${{ steps.current-task.outputs.task_def }} \
            --query 'taskDefinition' > task_def.json
          
          # Update image in task definition
          jq --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE' \
            task_def.json > updated_task_def.json
          
          # Remove fields that can't be passed to register
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            updated_task_def.json > final_task_def.json
          
          # Register new task definition
          NEW_TASK_DEF=$(aws ecs register-task-definition \
            --cli-input-json file://final_task_def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          echo "new_task_def=${NEW_TASK_DEF}" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.update-task.outputs.new_task_def }} \
            --force-new-deployment

      - name: Wait for deployment stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
        timeout-minutes: 10

      - name: Verify deployment health
        id: health-check
        run: |
          # Get running tasks
          TASKS=$(aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --query 'taskArns' \
            --output text)
          
          echo "Running tasks: ${TASKS}"
          
          # Check task health
          HEALTH=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks $TASKS \
            --query 'tasks[0].healthStatus' \
            --output text)
          
          echo "Task health status: ${HEALTH}"
          
          if [ "$HEALTH" = "UNHEALTHY" ]; then
            echo "::warning::Task is reporting as unhealthy"
          fi

  # ===========================================
  # Invalidate CloudFront Cache
  # ===========================================
  invalidate-cache:
    name: Invalidate CloudFront Cache
    runs-on: ubuntu-latest
    needs: deploy-ecs
    if: success()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create CloudFront invalidation
        id: invalidation
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          
          echo "invalidation_id=${INVALIDATION_ID}" >> $GITHUB_OUTPUT
          echo "Created CloudFront invalidation: ${INVALIDATION_ID}"

      - name: Wait for invalidation
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id ${{ steps.invalidation.outputs.invalidation_id }}
        timeout-minutes: 5
        continue-on-error: true

  # ===========================================
  # Post-Deployment Verification
  # ===========================================
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-ecs, invalidate-cache]
    if: success()

    steps:
      - name: Health check
        run: |
          # Wait for service to be fully up
          sleep 30
          
          # Check health endpoint
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://valorhive.in/api/health || echo "000")
          
          if [ "$RESPONSE" != "200" ]; then
            echo "::warning::Health check returned status ${RESPONSE}"
          else
            echo "✅ Health check passed"
          fi

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment || 'production' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # Rollback on Failure
  # ===========================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: [deploy-ecs, verify]
    if: failure()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback ECS service
        run: |
          # Get the previous task definition
          PREVIOUS_TASK=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].deployments[?status==`INACTIVE`].taskDefinition' \
            --output text | head -1)
          
          if [ -n "$PREVIOUS_TASK" ]; then
            echo "Rolling back to task definition: ${PREVIOUS_TASK}"
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service ${{ env.ECS_SERVICE }} \
              --task-definition $PREVIOUS_TASK
          else
            echo "::warning::No previous deployment found for rollback"
          fi

      - name: Notify team
        run: |
          echo "::error::Deployment failed - rollback initiated"
          echo "## ⚠️ Rollback Initiated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployment failed and rollback has been triggered." >> $GITHUB_STEP_SUMMARY
          echo "Please investigate the logs and fix the issue." >> $GITHUB_STEP_SUMMARY
