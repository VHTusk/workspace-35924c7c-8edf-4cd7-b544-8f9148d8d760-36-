# VALORHIVE Prometheus Configuration
# 
# Scrapes metrics from all services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'valorhive'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # VALORHIVE Application
  - job_name: 'valorhive-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/metrics/prometheus'
    scheme: http

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # WebSocket Service
  - job_name: 'websocket'
    static_configs:
      - targets: ['websocket:3003']
    metrics_path: '/metrics'

  # Background Workers
  - job_name: 'workers'
    static_configs:
      - targets: ['worker:3001']
    metrics_path: '/metrics'
