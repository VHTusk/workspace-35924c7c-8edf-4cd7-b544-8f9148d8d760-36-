# VALORHIVE Grafana Datasources
# 
# Auto-configured datasources for Prometheus

apiVersion: 1

datasources:
  # Prometheus
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '15s'
      httpMethod: 'POST'

  # PostgreSQL (for ad-hoc queries)
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: valorhive
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: 'disable'
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
    editable: false
