# VALORHIVE Prometheus Configuration
#
# Scrape configuration for VALORHIVE services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'valorhive'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load alerting rules
rule_files:
  - alerts.yml

# Scrape configurations
scrape_configs:
  # ===========================================
  # VALORHIVE Application
  # ===========================================
  - job_name: 'valorhive-app'
    metrics_path: '/api/metrics'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'app:3000'
        labels:
          service: 'valorhive-app'
          component: 'web'

  # ===========================================
  # WebSocket Service
  # ===========================================
  - job_name: 'valorhive-tournament-ws'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'tournament-ws:3003'
        labels:
          service: 'valorhive-tournament-ws'
          component: 'websocket'

  # ===========================================
  # Cron Service
  # ===========================================
  - job_name: 'valorhive-cron'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'cron-service:3010'
        labels:
          service: 'valorhive-cron'
          component: 'scheduler'

  # ===========================================
  # Redis Exporter (if deployed)
  # ===========================================
  # - job_name: 'redis'
  #   static_configs:
  #     - targets:
  #         - 'redis-exporter:9121'

  # ===========================================
  # Prometheus Self-Monitoring
  # ===========================================
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          service: 'prometheus'
          component: 'monitoring'

  # ===========================================
  # Node Exporter (for system metrics)
  # ===========================================
  # - job_name: 'node'
  #   static_configs:
  #     - targets:
  #         - 'node-exporter:9100

# Remote write configuration (for long-term storage)
